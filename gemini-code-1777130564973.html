<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cadangan KPTMKB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Konfigurasi Sila Isi ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const appId = 'e-cadangan-kptmkb';
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxhjHOIX31y2EKlKb8tujWXVzsC2PYYQTuQz76DkhJX2TP7Sv0DYy3AtqCF3n7w-ivv/exec";

        function App() {
            const [step, setStep] = useState(1);
            const [studentId, setStudentId] = useState('');
            const [categories, setCategories] = useState([]);
            const [suggestions, setSuggestions] = useState({});
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [errorMessage, setErrorMessage] = useState('');

            const categoryOptions = [
                { ms: 'Umum', en: 'General' },
                { ms: 'Kediaman', en: 'Accommodation' },
                { ms: 'Kewangan', en: 'Finance' },
                { ms: 'Pentadbiran', en: 'Administration' },
                { ms: 'Akademik', en: 'Academic' },
                { ms: 'Fasiliti', en: 'Facilities' }
            ];

            // Re-render Lucide icons whenever step changes
            useEffect(() => {
                lucide.createIcons();
            }, [step, isDropdownOpen, categories]);

            const handleIdSubmit = (e) => {
                e.preventDefault();
                if (!studentId.trim()) {
                    setErrorMessage('Sila masukkan No. ID Pelajar.');
                    return;
                }
                setStudentId(studentId.toUpperCase().trim());
                setStep(2);
                setErrorMessage('');
            };

            const handleFinalSubmit = async (e) => {
                e.preventDefault();
                if (categories.length === 0) {
                    setErrorMessage('Pilih kategori dahulu.');
                    return;
                }

                setIsSubmitting(true);
                const submissionData = {
                    studentId,
                    categories,
                    suggestions,
                    createdAt: new Date().toISOString()
                };

                try {
                    // Hantar ke Google Sheets
                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(submissionData)
                    });
                    setStep(3);
                } catch (error) {
                    setErrorMessage('Ralat penghantaran. Cuba lagi.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const renderHeader = () => (
                <div className="bg-purple-900 text-white p-6 shadow-md rounded-t-2xl sm:rounded-none">
                    <div className="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex flex-col sm:flex-row items-center gap-4">
                            <div className="flex items-center gap-3 bg-white p-2 rounded-xl">
                                <img src="https://iili.io/B6vhrXa.md.png" alt="Logo KPTM" className="h-10" />
                                <img src="https://iili.io/B6vj6u9.png" alt="Logo MPP" className="h-10" />
                            </div>
                            <div className="text-center sm:text-left">
                                <h1 className="text-xl font-bold">E-Cadangan KPTMKB</h1>
                                <p className="text-purple-300 text-[10px] uppercase font-bold">Portal Maklum Balas Pelajar</p>
                            </div>
                        </div>
                        <button onClick={() => setStep(4)} className="p-2 bg-purple-800 hover:bg-purple-700 rounded-full flex items-center gap-2 px-3 text-xs">
                            <i data-lucide="lock" className="w-4 h-4"></i> Admin
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    <div className="w-full flex-grow flex flex-col items-center sm:pt-10">
                        <div className="bg-white shadow-2xl w-full max-w-4xl min-h-[80vh] sm:rounded-[2.5rem] overflow-hidden flex flex-col">
                            {renderHeader()}
                            
                            <div className="flex-grow">
                                {step === 1 && (
                                    <div className="flex flex-col items-center justify-center p-10 h-full text-center space-y-6">
                                        <i data-lucide="user-circle" className="w-20 h-20 text-purple-600"></i>
                                        <h2 className="text-2xl font-black uppercase">E-Cadangan MPP 2026</h2>
                                        <form onSubmit={handleIdSubmit} className="w-full max-w-xs space-y-4">
                                            <input 
                                                type="text" value={studentId} 
                                                onChange={(e) => setStudentId(e.target.value)}
                                                placeholder="KBJXXXXXXXX"
                                                className="w-full p-4 bg-gray-50 border-2 rounded-2xl text-center font-bold focus:border-purple-600 outline-none"
                                            />
                                            {errorMessage && <p className="text-red-500 text-xs font-bold">{errorMessage}</p>}
                                            <button type="submit" className="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold uppercase hover:bg-purple-700">
                                                Seterusnya / Next
                                            </button>
                                        </form>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="p-6 space-y-6 max-w-2xl mx-auto">
                                        <div className="flex justify-between items-center bg-purple-50 p-4 rounded-xl">
                                            <span className="font-bold text-purple-900">ID: {studentId}</span>
                                            <span className="text-[10px] text-purple-400 font-bold uppercase italic">Borang Maklum Balas</span>
                                        </div>

                                        <div className="relative">
                                            <label className="text-xs font-black uppercase text-gray-400 mb-2 block">Pilih Kategori</label>
                                            <button 
                                                onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                                                className="w-full p-4 bg-white border-2 border-purple-100 rounded-xl flex justify-between items-center"
                                            >
                                                <span className="font-medium">{categories.length === 0 ? 'Pilih...' : `${categories.length} dipilih`}</span>
                                                <i data-lucide="chevron-down" className={`transition-transform ${isDropdownOpen ? 'rotate-180' : ''}`}></i>
                                            </button>
                                            
                                            {isDropdownOpen && (
                                                <div className="absolute z-10 w-full mt-2 bg-white border shadow-xl rounded-xl p-2">
                                                    {categoryOptions.map(cat => (
                                                        <div 
                                                            key={cat.ms} 
                                                            onClick={() => {
                                                                if (categories.includes(cat.ms)) setCategories(categories.filter(c => c !== cat.ms));
                                                                else setCategories([...categories, cat.ms]);
                                                            }}
                                                            className={`p-3 rounded-lg cursor-pointer flex items-center gap-3 ${categories.includes(cat.ms) ? 'bg-purple-50' : 'hover:bg-gray-50'}`}
                                                        >
                                                            <i data-lucide={categories.includes(cat.ms) ? "check-square" : "square"} className={`w-5 h-5 ${categories.includes(cat.ms) ? 'text-purple-600' : 'text-gray-300'}`}></i>
                                                            <div>
                                                                <p className="text-sm font-bold">{cat.ms}</p>
                                                                <p className="text-[10px] text-gray-400 italic">{cat.en}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {categories.map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <label className="text-[10px] font-black uppercase text-purple-600">{cat}</label>
                                                <textarea 
                                                    value={suggestions[cat] || ''}
                                                    onChange={(e) => setSuggestions({...suggestions, [cat]: e.target.value})}
                                                    placeholder="Tulis cadangan anda..."
                                                    className="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-purple-200 outline-none h-32"
                                                />
                                            </div>
                                        ))}

                                        <button 
                                            onClick={handleFinalSubmit}
                                            disabled={isSubmitting}
                                            className="w-full bg-purple-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-purple-700 disabled:opacity-50"
                                        >
                                            {isSubmitting ? 'Menghantar...' : 'Hantar Cadangan'}
                                        </button>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="flex flex-col items-center justify-center p-10 h-full text-center space-y-6">
                                        <i data-lucide="check-circle-2" className="w-20 h-20 text-green-500"></i>
                                        <h2 className="text-2xl font-black uppercase">Berjaya Dihantar!</h2>
                                        <button onClick={() => window.location.reload()} className="bg-purple-100 text-purple-700 px-8 py-3 rounded-xl font-bold">Kembali ke Utama</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    <footer className="p-10 text-center text-[10px] font-bold text-slate-400 tracking-widest uppercase">
                        © 2026 MPP KPTMKB
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
